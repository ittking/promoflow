# PromoFlow 部署配置
# 使用阿里云镜像仓库

x-shared-api-worker-config: &shared-api-worker-config
  env_file:
    - path: ./.envs/shared.env
      required: false
    - path: ./.envs/api.env
      required: false
    - path: ./.envs/security.env
      required: false
    - path: ./.envs/db-postgres.env
      required: false
    - path: ./.envs/redis.env
      required: false
    - path: ./.envs/weaviate.env
      required: false
    - .env
  networks:
    - ssrf_proxy_network
    - default
  restart: always

x-shared-worker-config: &shared-worker-config
  env_file:
    - path: ./.envs/shared.env
      required: false
    - path: ./.envs/worker.env
      required: false
    - path: ./.envs/security.env
      required: false
    - path: ./.envs/db-postgres.env
      required: false
    - path: ./.envs/redis.env
      required: false
    - path: ./.envs/weaviate.env
      required: false
    - .env
  networks:
    - ssrf_proxy_network
    - default
  restart: always

x-shared-worker-beat-config: &shared-worker-beat-config
  env_file:
    - path: ./.envs/shared.env
      required: false
    - path: ./.envs/worker-beat.env
      required: false
    - path: ./.envs/security.env
      required: false
    - path: ./.envs/db-postgres.env
      required: false
    - path: ./.envs/redis.env
      required: false
    - path: ./.envs/weaviate.env
      required: false
    - .env
  networks:
    - ssrf_proxy_network
    - default
  restart: always

services:
  # Init container to fix permissions
  init_permissions:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/busybox:latest
    command:
      - sh
      - -c
      - |
        FLAG_FILE="/app/api/storage/.init_permissions"
        if [ -f "$${FLAG_FILE}" ]; then
          echo "Permissions already initialized. Exiting."
          exit 0
        fi
        echo "Initializing permissions for /app/api/storage"
        chown -R 1001:1001 /app/api/storage && touch "$${FLAG_FILE}"
        echo "Permissions initialized. Exiting."
    volumes:
      - ./volumes/app/storage:/app/api/storage
    restart: "no"

  # API service
  api:
    <<: *shared-api-worker-config
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/dify-api:latest
    environment:
      MODE: api
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./volumes/app/storage:/app/api/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ssrf_proxy_network
      - default

  # WebSocket service
  api_websocket:
    <<: *shared-api-worker-config
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/dify-api:latest
    profiles:
      - collaboration
    environment:
      MODE: api
      SERVER_WORKER_AMOUNT: 1
      SERVER_WORKER_CLASS: geventwebsocket.gunicorn.workers.GeventWebSocketWorker
      SERVER_WORKER_CONNECTIONS: 1000
      GUNICORN_TIMEOUT: 360
    depends_on:
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ssrf_proxy_network
      - default

  # Worker service
  worker:
    <<: *shared-worker-config
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/dify-api:latest
    environment:
      MODE: worker
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./volumes/app/storage:/app/api/storage
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_healthcheck.celery inspect ping"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
      disable: true
    networks:
      - ssrf_proxy_network
      - default

  # Worker beat service
  worker_beat:
    <<: *shared-worker-beat-config
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/dify-api:latest
    environment:
      MODE: beat
    depends_on:
      init_permissions:
        condition: service_completed_successfully
      db_postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_healthcheck.celery inspect ping"]
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
      disable: true
    networks:
      - ssrf_proxy_network
      - default

  # Frontend web application
  web:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/dify-web:latest
    restart: always
    env_file:
      - .env
    environment:
      CONSOLE_API_URL: ${CONSOLE_API_URL:-}
      SERVER_CONSOLE_API_URL: ${SERVER_CONSOLE_API_URL:-http://api:5001}
      APP_API_URL: ${APP_API_URL:-}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-ws://localhost}
      NEXT_TELEMETRY_DISABLED: 1

  # PostgreSQL database
  db_postgres:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/postgres:15-alpine
    profiles:
      - postgresql
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-difyai123456}
      POSTGRES_DB: ${DB_DATABASE:-dify}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=128MB
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "db_postgres", "-U", "${DB_USERNAME:-postgres}"]
      interval: 1s
      timeout: 3s
      retries: 60

  # Redis cache
  redis:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/redis:6-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-difyai123456}
    volumes:
      - ./volumes/redis/data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-difyai123456} ping | grep -q PONG"]

  # Sandbox
  sandbox:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/dify-sandbox:0.2.15
    restart: always
    env_file:
      - .env
    environment:
      API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
      GIN_MODE: release
      WORKER_TIMEOUT: 15
      ENABLE_NETWORK: true
      HTTP_PROXY: http://ssrf_proxy:3128
      HTTPS_PROXY: http://ssrf_proxy:3128
      SANDBOX_PORT: 8194
      PIP_MIRROR_URL: ${PIP_MIRROR_URL:-}
    volumes:
      - ./volumes/sandbox/dependencies:/dependencies
      - ./volumes/sandbox/conf:/conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8194/health"]
    networks:
      - ssrf_proxy_network

  # Plugin daemon
  plugin_daemon:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/dify-plugin-daemon:0.6.3-local
    restart: always
    env_file:
      - .env
    networks:
      - ssrf_proxy_network
      - default
    environment:
      DB_DATABASE: ${DB_PLUGIN_DATABASE:-dify_plugin}
      SERVER_PORT: ${PLUGIN_DAEMON_PORT:-5002}
      SERVER_KEY: ${PLUGIN_DAEMON_KEY:-lYkiYYT6owG+71oLerGzA7GXCgOT++6ovaezWAjpCjf+Sjc3ZtU+qUEi}
      DIFY_INNER_API_URL: http://api:5001
      DIFY_INNER_API_KEY: ${PLUGIN_DIFY_INNER_API_KEY:-QaHbTe77CtuXmsfyhR7+vRjI/+XbV1AaFy691iy+kGDv2Jvy0/eAh8Y1}
    ports:
      - "${EXPOSE_PLUGIN_DEBUGGING_PORT:-5003}:5003"
    volumes:
      - ./volumes/plugin_daemon:/app/storage
    depends_on:
      db_postgres:
        condition: service_healthy

  # SSRF proxy
  ssrf_proxy:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/ubuntu-squid:latest
    restart: always
    volumes:
      - ./ssrf_proxy/squid.conf:/etc/squid/squid.conf
    environment:
      HTTP_PORT: 3128
    networks:
      - ssrf_proxy_network
      - default

  # Nginx reverse proxy
  nginx:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/nginx:latest
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ./volumes/certbot/conf:/etc/letsencrypt
      - ./volumes/certbot/www:/var/www/html
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_HTTPS_ENABLED: ${NGINX_HTTPS_ENABLED:-false}
      NGINX_PORT: 80
      NGINX_SSL_PORT: 443
    depends_on:
      - api
      - web
    ports:
      - "${EXPOSE_NGINX_PORT:-80}:80"
      - "${EXPOSE_NGINX_SSL_PORT:-443}:443"

  # Weaviate vector store
  weaviate:
    image: ${ALIYUN_REGISTRY}/${ALIYUN_NAMESPACE}/weaviate:1.27.0
    profiles:
      - weaviate
    restart: always
    volumes:
      - ./volumes/weaviate:/var/lib/weaviate
    environment:
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: false
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
      AUTHENTICATION_APIKEY_ENABLED: true
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: true
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai
      DISABLE_TELEMETRY: false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ssrf_proxy_network:
    driver: bridge
    internal: true
  default:
    driver: bridge

volumes:
  db_data:
  redis_data:
  app_storage:
  sandbox_dependencies:
  sandbox_conf:
  plugin_daemon:
  weaviate:
  certbot_conf:
  certbot_www: